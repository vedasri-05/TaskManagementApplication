<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<link rel="stylesheet" href="task.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.7.0/tabler-icons.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<body>

<div style="position:relative" id="root">

<div id="auth-screen">
<div class="auth-wrap">
<div class="auth-box">

<div class="auth-top">
<div class="auth-icon">
<i class="ti ti-layout-kanban"></i>
</div>
<div class="auth-h">TaskFlow</div>
<div class="auth-sub">
A clean workspace for focused teams
</div>
</div>

<div class="auth-tabs">
<button class="at on" onclick="swAuth('in')">
Sign in
</button>

<button class="at" onclick="swAuth('up')">
Sign up
</button>
</div>

<div class="ap on" id="ap-in">

<div class="field">
<label class="fl">Email</label>
<input type="email" id="li-em"
value="alex@taskflow.io">
</div>

<div class="field">
<label class="fl">Password</label>
<input type="password" id="li-pw"
value="••••••••">
</div>

<button class="asub" onclick="doLogin()">
Sign in
</button>

<p class="ahint">
Any email + password works for this demo
</p>

</div>

<div class="ap" id="ap-up">

<div class="field">
<label class="fl">Full name</label>
<input type="text" id="su-nm"
placeholder="Your name">
</div>

<div class="field">
<label class="fl">Email</label>
<input type="email" id="su-em"
placeholder="you@example.com">
</div>

<div class="field">
<label class="fl">Password</label>
<input type="password" id="su-pw"
placeholder="Create a password">
</div>

<button class="asub" onclick="doSignup()">
Create account
</button>

</div>

</div>
</div>
</div>

<div id="app-shell" style="display:none">

<div class="shell">

<div class="side">

<div class="brand">
<div class="brand-dot">
<i class="ti ti-layout-kanban"></i>
</div>
<span class="brand-name">TaskFlow</span>
</div>

<div class="navl">

<div class="ni on" id="nv-board"
onclick="goPage('board')">
<i class="ti ti-columns"></i>
Board
</div>

<div class="ni" id="nv-dash"
onclick="goPage('dash')">
<i class="ti ti-chart-bar"></i>
Dashboard
</div>

<div class="ni" id="nv-act"
onclick="goPage('act')">
<i class="ti ti-bell"></i>
Activity
</div>

<div class="ni-bot">

<div class="ni" id="nv-prof"
onclick="goPage('prof')">
<i class="ti ti-user"></i>
Profile
</div>

<div class="ni" onclick="logout()">
<i class="ti ti-logout"></i>
Sign out
</div>

</div>
</div>
</div>

<div class="main">

<div class="topbar">
<div class="tb-left">
<span class="page-label" id="pg-label">
Board
</span>
</div>

<div class="tb-right">
<span class="uname" id="u-name"></span>
<div class="uav" id="u-av"></div>
</div>
</div>

<div class="content">

<div class="pg on" id="pg-board">

<div style="display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:12px">

<div class="ws-pill">
<span class="ws-led"></span>
Live sync active
</div>

<button class="btn-add"
onclick="openAdd()">
<i class="ti ti-plus"></i>
New task
</button>

</div>

<div class="filters">

<div class="fchip on"
onclick="setF('all',this)">
All
</div>

<div class="fchip"
onclick="setF('high',this)">
High Priority
</div>

<div class="fchip"
onclick="setF('mine',this)">
Mine
</div>

</div>

<div class="board" id="kanban"></div>

</div>
<div class="pg" id="pg-dash">

<div class="stats" id="stats-grid"></div>

<div style="display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:4px">

<div class="chart-wrap">
<div class="chart-title">
Status Breakdown
</div>
<canvas id="c-status" height="150"></canvas>
</div>

<div class="chart-wrap">
<div class="chart-title">
Priority Mix
</div>
<canvas id="c-pri" height="150"></canvas>
</div>

</div>
</div>

<div class="pg" id="pg-act">

<div class="sec-title"
style="margin-bottom:14px">
Recent Activity
</div>

<div id="act-list"></div>

</div>

<div class="pg" id="pg-prof">

<div style="
background:white;
border-radius:12px;
padding:20px;
max-width:380px">

<div style="
display:flex;
align-items:center;
gap:14px;
margin-bottom:16px;
padding-bottom:16px;
border-bottom:1px solid #ddd">

<div id="prof-av"
style="
width:48px;
height:48px;
border-radius:50%;
background:#EEEDFE;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:600;
color:#534AB7">
</div>

<div>
<div id="prof-name"
style="font-size:14px;font-weight:600">
</div>

<div id="prof-email"
style="font-size:12px;color:#777">
</div>
</div>

</div>

<div style="font-size:12px;color:#777">
Member since June 2026 ·
<span id="prof-count"></span>
tasks assigned
</div>

</div>
</div>

</div>
</div>
</div>

<div class="toast-wrap">
<div class="toast" id="toast">
<i class="ti ti-check"></i>
<span id="toast-txt"></span>
</div>
</div>

</div>

<!-- ADD TASK MODAL -->

<div class="ovl" id="add-ovl">

<div class="mbox">

<div class="mhd">

<span class="mt" id="add-ttl">
New Task
</span>

<button class="xbtn"
onclick="closeOvl('add-ovl')">
<i class="ti ti-x"></i>
</button>

</div>

<div class="field">
<label class="fl">Title</label>
<input type="text"
id="f-title"
placeholder="Task title">
</div>

<div class="field">
<label class="fl">Description</label>
<textarea id="f-desc"
placeholder="Task details"></textarea>
</div>

<div class="frow">

<div class="field">
<label class="fl">Priority</label>
<select id="f-pri">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>
</div>

<div class="field">
<label class="fl">Category</label>
<select id="f-cat">
<option value="feature">Feature</option>
<option value="bug">Bug</option>
<option value="design">Design</option>
<option value="infra">Infrastructure</option>
</select>
</div>

</div>

<div class="field">
<label class="fl">Assignee</label>
<select id="f-asn">
<option>Alex</option>
<option>Sam</option>
<option>Jordan</option>
<option>Taylor</option>
</select>
</div>

<div class="mact">

<button class="btn-can"
onclick="closeOvl('add-ovl')">
Cancel
</button>

<button class="btn-save"
onclick="saveTask()">
Save
</button>

</div>

</div>
</div>
<!-- TASK DETAILS MODAL -->

<div class="ovl" id="det-ovl">

<div class="mbox">

<div class="mhd">

<span class="mt" id="det-title"></span>

<button class="xbtn"
onclick="closeOvl('det-ovl')">
<i class="ti ti-x"></i>
</button>

</div>

<p id="det-desc"
style="
font-size:13px;
line-height:1.6;
margin-bottom:12px">
</p>

<div style="
display:flex;
align-items:center;
gap:8px;
margin-bottom:12px">

<span style="font-size:11px">
Status
</span>

<select class="det-sel"
id="det-status"
onchange="updStatus()">

<option value="todo">To Do</option>
<option value="inprogress">In Progress</option>
<option value="done">Done</option>

</select>

</div>

<div class="det-tags"
id="det-tags">
</div>

<div class="mact">

<button class="del-btn"
onclick="delTask()">
<i class="ti ti-trash"></i>
Delete
</button>

<div style="
display:flex;
gap:8px;
margin-left:auto">

<button class="btn-can"
onclick="closeOvl('det-ovl')">
Close
</button>

<button class="btn-save"
onclick="openEdit()">
Edit
</button>

</div>

</div>

</div>

</div>

<script src="task.js"></script>

</body>
</html>
